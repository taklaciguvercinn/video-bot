name: Video Bot v3

on:
  workflow_dispatch:
    inputs:
      command:
        description: 'Komut: Konu,Dakika,Resim,VideoSayisi,GG.AA.YYYY,SS:DD'
        required: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Bagimliliklar
        run: |
          pip install requests edge-tts
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-dejavu-core fonts-liberation
          echo "FFmpeg: $(ffmpeg -version 2>&1 | head -1)"

      - name: Video Uret
        env:
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
          YOUTUBE_CLIENT_ID:     ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python generate_video.py "${{ github.event.inputs.command }}"

      - name: Sonuc
        if: always()
        run: cat output/result.json 2>/dev/null || echo "Sonuc yok"

      - name: Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: video-${{ github.run_number }}
          path: |
            output/result.json
            output/metadata.json
            output/thumbnail.jpg
          retention-days: 7
          if-no-files-found: warn